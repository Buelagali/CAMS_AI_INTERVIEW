version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-cams-prod-secret-change-me}
      - JWT_DISABLED=false
      - CORS_ORIGINS=http://localhost:3000,http://frontend:80
      - LOG_DIR=/app/backend/logs
      - MODEL_REGISTRY_DIR=/app/backend/models/registry
      - GPU_DISABLED=${GPU_DISABLED:-true}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - backend_logs:/app/backend/logs
      - backend_models:/app/backend/models
      - backend_datasets:/app/backend/datasets
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 2g

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000
    restart: unless-stopped

volumes:
  redis_data:
  backend_logs:
  backend_models:
  backend_datasets:
